name: Oracle A1 Retry
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet
      - name: Configure OCI
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf "%s" "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf "[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=/home/runner/.oci/oci_api_key.pem\n" "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" > ~/.oci/config
      - name: Try create A1 instance
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
        run: |
          SSH_KEY="ssh-rsa  radio-hermes-oracle"
          CLOUD_INIT=$(printf '#cloud-config\nssh_authorized_keys:\n  - %s\n' "$SSH_KEY" | base64 -w0)
          for AD_NUM in 1 2 3; do
            AD=$(oci iam availability-domain list --compartment-id "$OCI_TENANCY_OCID" --query "data[$((AD_NUM-1))].name" --raw-output 2>/dev/null || echo "")
            [ -z "$AD" ] && echo "AD-${AD_NUM} no encontrado" && continue
            echo ">> Intentando $AD"
            RESULT=$(oci compute instance launch --availability-domain "$AD" --compartment-id "$OCI_TENANCY_OCID" --shape VM.Standard.A1.Flex --shape-config '{"ocpus":1,"memoryInGBs":6}' --subnet-id "$OCI_SUBNET_OCID" --image-id "$OCI_IMAGE_OCID" --display-name radio-hermes-server --user-data "$CLOUD_INIT" --assign-public-ip true 2>&1 || true)
            echo "$RESULT" | grep -q '"id": "ocid1.instance' && echo "EXITO en $AD" && echo "$RESULT" | grep -E '"id"|"lifecycle-state"' && exit 0
            echo "$AD: sin capacidad"
          done
          echo "Sin capacidad. Reintentando en 10 min."
